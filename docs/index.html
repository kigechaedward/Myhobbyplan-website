<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHobbyPlan — Organize, Schedule, Plan</title>
    <!-- Modern Font Stack -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-gradient: linear-gradient(135deg, #f5f7ff 0%, #e0e7ff 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            padding: 48px;
            max-width: 560px;
            width: 100%;
            text-align: center;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: #eef2ff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .logo-icon {
            color: var(--primary);
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: #111827;
            margin-bottom: 12px;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.125rem;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .links-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: var(--transition);
            cursor: pointer;
            border: none;
        }

        .link-button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .link-button.secondary {
            background-color: white;
            color: var(--text-main);
            border: 1px solid #e5e7eb;
        }

        .link-button.secondary:hover {
            background-color: #f9fafb;
            border-color: #d1d5db;
        }

        footer {
            padding-top: 32px;
            border-top: 1px solid #f3f4f6;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .footer-info {
            margin-bottom: 16px;
        }

        .footer-info p {
            margin-bottom: 4px;
        }

        .footer-info a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-info a:hover {
            text-decoration: underline;
        }

        .copyright {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }
            h1 {
                font-size: 1.75rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                transition: none !important;
                transform: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <!-- Planning Icon SVG -->
            <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
            </svg>
        </div>

        <h1>MyHobbyPlan</h1>
        <p class="tagline">Organize your hobbies, schedule activities, and plan your days with ease.</p>
        
        <div class="links-section">
            <a href="privacy.html" class="link-button">Privacy Policy</a>
            <a href="terms.html" class="link-button secondary">Terms & Conditions</a>
        </div>

        <footer>
            <div class="footer-info">
                <p><strong>Eleviq Technologies</strong></p>
                <p>Email: <a href="mailto:contact@myhobbyplan.net">contact@myhobbyplan.net</a></p>
                <p>Phone: +254 790 683 823</p>
            </div>
            <p class="copyright">© 2026 MyHobbyPlan. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
